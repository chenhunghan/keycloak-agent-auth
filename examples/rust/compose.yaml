# Self-contained compose for the Rust example.
#
# Includes the repo-root compose (Keycloak + extension) and adds the
# resource server alongside it on the same compose network. Run from
# this directory:
#
#   docker compose up -d
#
# If your Docker Compose is too old for `include:` (< 2.20), use two -f flags:
#
#   docker compose -f ../../docker-compose.yml -f compose.yaml up -d

include:
  - path: ../../docker-compose.yml

services:
  resource-server:
    build:
      context: .
    environment:
      PORT: "3000"
    # Not published to the host — Keycloak reaches it via the compose
    # network at http://resource-server:3000.
